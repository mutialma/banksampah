<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EcoBank — Bank Sampah Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast-area"></div>

<!-- ═══════ LOGIN ═══════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-top">
      <div class="login-brand">🌿 EcoBank</div>
      <div class="login-tagline">Bank Sampah Digital · Tabungan Ramah Lingkungan</div>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin')">🛡️ Admin</button>
      <button class="role-tab" onclick="setRole('nasabah')">🙋 Nasabah</button>
      <button class="role-tab" onclick="setRole('pemasok')">🏪 Pemasok</button>
    </div>
    <div class="login-body">
      <!-- Login -->
      <div class="login-form active" id="lf-login">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="f-user" class="form-control" placeholder="Masukkan username">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="f-pass" class="form-control" placeholder="Masukkan password"
              onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <div class="form-error" id="login-err"></div>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" id="btn-login">Masuk →</button>
        <div id="reg-link" style="display:none;text-align:center;margin-top:12px;font-size:13px;color:var(--ink3)">
          Belum punya akun? <button class="link-btn" onclick="showReg()">Daftar sekarang</button>
        </div>
        <div class="demo-hint" id="demo-hint"><strong>Demo:</strong> <span id="demo-cred">admin / admin123</span></div>
      </div>
      <!-- Register -->
      <div class="login-form" id="lf-reg">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="r-nama" class="form-control" placeholder="Nama lengkap">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="r-user" class="form-control" placeholder="min. 4 karakter">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="r-pass" class="form-control" placeholder="min. 6 karakter">
          </div>
        </div>
        <div class="form-group">
          <label>No. HP</label>
          <input type="tel" id="r-hp" class="form-control" placeholder="08xxxxxxxxxx">
        </div>
        <div class="form-group">
          <label>Alamat</label>
          <textarea id="r-alamat" class="form-control" rows="2" placeholder="Alamat lengkap"></textarea>
        </div>
        <div class="form-error" id="reg-err"></div>
        <button class="btn btn-primary btn-full btn-lg" onclick="doReg()" id="btn-reg">🌱 Daftar Sekarang</button>
        <div style="text-align:center;margin-top:12px;font-size:13px;color:var(--ink3)">
          Sudah punya akun? <button class="link-btn" onclick="showLogin()">Masuk</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════ MODAL ═══════ -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClose(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ═══════ APP ═══════ -->
<div id="app">
  <div class="sb-overlay" id="sb-overlay" onclick="closeSb()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sb-top">
      <button class="sb-close" onclick="closeSb()">✕</button>
      <div class="sb-logo">
        <div class="sb-logo-icon">🌿</div>
        <span class="sb-logo-text">EcoBank</span>
      </div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-ava">👤</div>
        <div>
          <div class="sb-uname" id="sb-uname">-</div>
          <div class="sb-urole" id="sb-urole">-</div>
          <span class="sb-badge" id="sb-badge">-</span>
        </div>
      </div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-bottom">
      <button class="logout-btn" onclick="doLogout()">🚪 Keluar</button>
    </div>
  </nav>
  <div class="main-area">
    <header class="topbar">
      <button class="topbar-hamburger" onclick="openSb()">
        <span></span><span></span><span></span>
      </button>
      <div class="tb-page-info">
        <div class="tb-page-icon" id="tb-ico">🏠</div>
        <div class="tb-page-title" id="tb-title">Dashboard</div>
      </div>
      <div class="tb-right">
        <div class="tb-user-chip">
          <span id="tb-ava">👤</span>
          <span id="tb-name">-</span>
        </div>
      </div>
    </header>
    <main class="page" id="page"></main>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
